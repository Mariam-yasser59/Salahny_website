<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salahny | Smart Auto Service Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var bootError = '';
        var moduleStatus = 'pending';
        var showBootError = function (message) {
          var root = document.getElementById('root');
          if (!root || root.childElementCount) return;
          root.innerHTML =
            '<main style="min-height:100vh;display:grid;place-items:center;background:#0b0d12;color:#f8fafc;font-family:Inter,Arial,sans-serif;padding:24px">' +
            '<section style="max-width:520px;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:24px;background:#151922">' +
            '<p style="margin:0 0 8px;color:#f97316;font-size:13px;text-transform:uppercase;letter-spacing:.08em">Startup issue</p>' +
            '<h1 style="margin:0 0 12px;font-size:24px">Salahny could not start</h1>' +
            '<p style="margin:0;color:#cbd5e1;line-height:1.5">Refresh the page. If this continues, check that browser storage and JavaScript are enabled.</p>' +
            '<pre style="white-space:pre-wrap;margin:16px 0 0;color:#fecaca;font-size:12px">' + (message || ('Module status: ' + moduleStatus)).replace(/[<>&]/g, function (char) { return ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" })[char]; }) + '</pre>' +
            '</section></main>';
        };
        window.addEventListener('error', function (event) {
          bootError = event.message || 'JavaScript failed while loading the app.';
          setTimeout(function () { showBootError(bootError); }, 0);
        });
        window.addEventListener('unhandledrejection', function (event) {
          bootError = event.reason && (event.reason.message || String(event.reason)) || 'A startup request failed.';
          setTimeout(function () { showBootError(bootError); }, 0);
        });
        var moduleScript = document.querySelector('script[type="module"][src]');
        if (moduleScript) {
          moduleScript.addEventListener('load', function () {
            moduleStatus = 'loaded';
          });
          moduleScript.addEventListener('error', function () {
            moduleStatus = 'failed';
            bootError = 'Module script failed to load: ' + moduleScript.src;
            showBootError(bootError);
          });
        }
        window.addEventListener('DOMContentLoaded', function () {
          if (!document.querySelector('script[type="module"][src]')) {
            moduleStatus = 'missing';
          }
          setTimeout(function () { showBootError(bootError); }, 3000);
        });
      }());
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
